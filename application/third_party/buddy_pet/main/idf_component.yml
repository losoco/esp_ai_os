## IDF Component Manager Manifest File
dependencies:
  espressif/esp_board_manager:
    version: "^0.5.12"
    public: true
  espressif/esp_mmap_assets:
    version: "^2.0.0"

  app_claw:
    path: ../components/common/app_claw

  pet_buddy:
    path: ../components/common/pet_buddy

  app_config:
    path: ../components/common/app_config

  app_runtime_state:
    path: ../components/common/app_runtime_state

  app_provisioning:
    path: ../components/common/app_provisioning

  app_wechat_setup:
    path: ../components/common/app_wechat_setup

  app_product_claw:
    path: ../components/common/app_product_claw

  product_mode_controller:
    path: ../components/common/product_mode_controller

  cmd_wifi:
    path: ../components/common/cmd_wifi

  captive_dns:
    path: ../../../../components/common/captive_dns

  claw_ramfs:
    path: ../../../../components/claw_modules/claw_ramfs

  http_reuse:
    path: ../../../../components/common/http_reuse

  http_server:
    path: ../components/common/http_server

  cap_match_watch:
    path: ../components/claw_capabilities/cap_match_watch

  cap_pet_buddy:
    path: ../components/claw_capabilities/cap_pet_buddy

  match_watch_runtime:
    path: ../components/common/match_watch_runtime

  config_runtime:
    path: ../components/common/config_runtime

  scene_runtime:
    path: ../components/common/scene_runtime

  lua_module_pet:
    rules:
      - if: $CONFIG{APP_CLAW_CAP_LUA} == True
    path: ../components/lua_modules/lua_module_pet

  lua_module_match_watch:
    rules:
      - if: $CONFIG{APP_CLAW_CAP_LUA} == True
    path: ../components/lua_modules/lua_module_match_watch

  settings:
    path: ../../../../components/common/settings

  wifi_manager:
    path: ../../../../components/common/wifi_manager

  espressif/esp_video:
    path: ../../../../components/common/esp_video
    matches:
    - if: $CONFIG{ESP_BOARD_DEV_CAMERA_SUPPORT} == True
